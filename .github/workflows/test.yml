name: CI Test Recursive Encoder

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Install dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            g++ \
            qtbase5-dev \
            libssl-dev

      - name: "Configure build"
        run: |
          rm -rf build
          cmake -S . -B build \
            -G Ninja \
            -DRECURSIVE_ENCODER_BUILD_TESTS=OFF \
            -DCMAKE_BUILD_TYPE=Debug

      - name: "Build"
        run: |
          cmake --build build --target recursive_encoder --parallel

      - name: "Prepare test data"
        run: |
          mkdir -p testdata/input
          echo "testdata" > testdata/input/file1.txt

      - name: "Test 1: Encrypt single file"
        run: |
          echo "password" | ./build/recursive_encoder encrypt testdata/input

      - name: "Test 2: Decrypt file"
        run: |
          echo "password" | ./build/recursive_encoder decrypt testdata/input

      - name: "Test 2: Validate decrypted content"
        run: |
          echo "testdata" > expected.txt
          diff testdata/input/file1.txt expected.txt

      - name: "Test 1: Ensure file is encrypted"
        run: |
          echo "secret" > testdata/input/file_check.txt
          echo "password" | ./build/recursive_encoder encrypt testdata/input
          ! grep -q "secret" testdata/input/file_check.txt

      - name: "Test 3: Recursive encryption"
        run: |
          mkdir -p testdata/input/subdir
          echo "inner" > testdata/input/subdir/file2.txt
          echo "password" | ./build/recursive_encoder encrypt testdata/input
          echo "password" | ./build/recursive_encoder decrypt testdata/input
          grep -q "inner" testdata/input/subdir/file2.txt

      - name: "Test 4: Double encryption"
        run: |
          set +e
          echo "data" > testdata/input/file3.txt
          echo "password" | ./build/recursive_encoder encrypt testdata/input
          echo "password" | ./build/recursive_encoder encrypt testdata/input

      - name: "Test 5: Wrong password"
        run: |
          set +e
          echo "wrongpass" | ./build/recursive_encoder decrypt testdata/input

      - name: "Test 7: Missing arguments"
        run: |
          set +e
          ./build/recursive_encoder encrypt
          test $? -ne 0

      - name: "Test 9: Invalid mode"
        run: |
          set +e
          ./build/recursive_encoder unknown testdata/input
          test $? -ne 0

      - name: "Test 8: Non-existent directory"
        run: |
          set +e
          echo "password" | ./build/recursive_encoder encrypt nonexistent_dir
          test $? -ne 0

      - name: "Test 6: Decrypt plain file"
        run: |
          set +e
          echo "plain text" > testdata/input/plain.txt
          echo "password" | ./build/recursive_encoder decrypt testdata/input

      - name: "Test 10: Empty directory"
        run: |
          mkdir -p testdata/emptydir
          echo "password" | ./build/recursive_encoder encrypt testdata/emptydir
name: CI Test Recursive Encoder

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Install dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            g++ \
            qtbase5-dev \
            libssl-dev

      - name: "Configure build"
        run: |
          rm -rf build
          cmake -S . -B build \
            -G Ninja \
            -DRECURSIVE_ENCODER_BUILD_TESTS=OFF \
            -DCMAKE_BUILD_TYPE=Debug

      - name: "Build"
        run: |
          cmake --build build --target recursive_encoder --parallel

      - name: "Prepare test data"
        run: |
          mkdir -p testdata/input
          echo "testdata" > testdata/input/file1.txt

      - name: "Test: Encrypt file"
        run: |
          echo "password" | ./build/recursive_encoder encrypt testdata/input

      - name: "Test: Decrypt file"
        run: |
          echo "password" | ./build/recursive_encoder decrypt testdata/input

      - name: "Test: Check decrypted content"
        run: |
          echo "testdata" > expected.txt
          diff testdata/input/file1.txt expected.txt

      - name: "Test: File actually encrypted"
        run: |
          echo "secret" > testdata/input/file_check.txt
          echo "password" | ./build/recursive_encoder encrypt testdata/input
          ! grep -q "secret" testdata/input/file_check.txt

      - name: "Test: Recursive encryption"
        run: |
          mkdir -p testdata/input/subdir
          echo "inner" > testdata/input/subdir/file2.txt
          echo "password" | ./build/recursive_encoder encrypt testdata/input
          echo "password" | ./build/recursive_encoder decrypt testdata/input
          grep -q "inner" testdata/input/subdir/file2.txt

      - name: "Test: Double encryption"
        run: |
          echo "data" > testdata/input/file3.txt
          echo "password" | ./build/recursive_encoder encrypt testdata/input
          ! echo "password" | ./build/recursive_encoder encrypt testdata/input 2>&1 | grep -qi "already"

      - name: "Test: Wrong password"
        run: |
          ! echo "wrongpass" | ./build/recursive_encoder decrypt testdata/input 2>&1 | grep -q "успешно"

      - name: "Test: Not enough arguments"
        run: |
          set +e
          OUTPUT=$(./build/recursive_encoder encrypt 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -qi "usage"

      - name: "Test: Invalid mode"
        run: |
          ! ./build/recursive_encoder unknown testdata/input 2>&1 | grep -qi "режим"

      - name: "Test: Non-existent directory"
        run: |
          set +e
          OUTPUT=$(echo "password" | ./build/recursive_encoder encrypt nonexistent_dir 2>&1)
          echo "$OUTPUT"

          echo "$OUTPUT" | grep -Ei "error"

      - name: "Upload logs"
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: |
            *.log
            testdata/**/*.log
          if-no-files-found: ignore
        if: always()